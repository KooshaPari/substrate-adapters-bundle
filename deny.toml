[graph]
all-features = true
all-targets = true
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
[licenses]
version = 2
allow = ["MIT", "Apache-2.0"]
[bans]
multiple-versions = "warn"
wildcards = "deny"
[sources]
unknown-registry = "deny"
unknown-git = ["https://github.com/KooshaPari/phenotype-workspace"]
