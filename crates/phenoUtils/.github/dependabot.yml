# .github/dependabot.yml - dependabot for the Phenotype fleet
# See ADR-042 (security audit cadence). Security-only updates.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "security"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 5
    # Only security updates
    # (set via the GitHub UI for the repo: "Security updates: enabled")
