[graph]
all-features = true
all-targets = true
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "Zlib", "MPL-2.0", "CC0-1.0", "OpenSSL", "Unlicense"]
confidence-threshold = 0.8
[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = []
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
